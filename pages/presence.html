<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion de Présences</title>
    <link rel="icon" type="image/png" href="../img/logo slmi.png">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="mb-0">Gestion de Présences</h1>
            
                <div class="dropdown text-end">
                    <button class="btn btn-outline-success dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="userDropdown">
                        <span class="dropdown-item-text fw-bold" id="userConnecte"></span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item-text fw-bold" id="userConnecte"></span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><button class="dropdown-item text-danger" onclick="deconnexion()">Déconnexion</button></li>
                    </ul>
                </div>
            </div>
            <hr>
            <h4>Statistiques</h4>
            <div class="stats">
                <div class="stat-box">
                    <h3 id="total">0</h3>
                    <p>Total enregistrements</p>
                </div>
                <div class="stat-box">
                    <h3 id="totalFrais">0 Ar</h3>
                    <p>Total frais</p>
                </div>
                <div class="stat-box">
                    <h3 id="nbJour">0</h3>
                    <p>Jours enregistrés</p>
                </div>
                <div class="stat-box">
                    <h3 id="heureMoyenne">--:--</h3>
                    <p>Heure moyenne d'arrivée</p>
                </div>
            </div>
        </div>
        <div class="card">
            
            <div class="grid">
                <div>
                    <label>Nom</label>
                    <input type="text" id="nom" placeholder="Ex: Jean Rakoto" />
                </div>
                <div>
                    <label>Date</label>
                    <input type="date" id="datePresence" />
                </div>
                <div>
                    <label>Heure d'arrivée</label>
                    <input type="time" id="heureArrivee" />
                </div>
                <div>
                    <label>Frais (Ar)</label>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <input type="number" id="frais" placeholder="Ex: 5000" min="0" />
                        <span style="font-weight:bold;">Ar</span>
                    </div>
                </div>
            </div>
            <div class="top-actions">
                <button class="btn btn-primary" onclick="ajouterPresence()">Ajouter</button>
                
            </div>
        </div>

       

        <div class="card">
            <h2>Liste des présences</h2>
            <div class="grid">
                <div>
                    <div class="row">
                        <div class="col-md-4">
                            
                    <input type="text" id="rechercheNom" placeholder="Rechercher un nom..." oninput="afficherPresences()" />
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-secondary" onclick="exporterPDF()">Exporter en PDF</button>
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-danger" onclick="viderDonnees()">Vider toutes les données</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="tableZone"></div>
        </div>
    </div>


</body>
<script src="../js/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
