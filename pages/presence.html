<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion de Présences</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/logo slmi.png">
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div id="messageBox"></div>

        <div class="card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="mb-0">
                    <img src="../img/logo slmi.png" width="200px" alt="">
                </h1>

                <div class="dropdown text-end">
                    <button class="btn btn-outline-success dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="userDropdown">
                        <span class="fw-bold" id="userConnecte"></span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item-text fw-bold" id="userConnecteNom"></span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><button class="dropdown-item text-danger" onclick="deconnexion()">Déconnexion</button></li>
                    </ul>
                </div>
            </div>

            <hr>

            <h4>Statistiques</h4>
            <div class="stats">
                <div class="stat-box">
                    <h3 id="total">0</h3>
                    <p>Total enregistrements</p>
                </div>
                <div class="stat-box">
                    <h3 id="totalFrais">0 Ar</h3>
                    <p>Total frais</p>
                </div>
                <div class="stat-box">
                    <h3 id="nbJour">0</h3>
                    <p>Jours enregistrés</p>
                </div>
                <div class="stat-box">
                    <h3 id="heureMoyenne">--:--</h3>
                    <p>Heure moyenne d'arrivée</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="top-actions">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPersonnel">
                    Ajouter un personnel
                </button>
                <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#modalListePersonnel" onclick="afficherPersonnels()">
                    Voir liste des personnels
                </button>
                <button class="btn btn-secondary" onclick="exporterDonneesJSON()">
                    Exporter JSON
                </button>
                <label class="btn btn-primary m-0">
                    Importer JSON
                    <input type="file" id="importJson" accept=".json" onchange="importerDonneesJSON(event)" hidden>
                </label>
            </div>
        </div>

        <div class="card">
            <h2>Enregistrement de présence</h2>

            <div class="grid">
                <div>
                    <label>Personnel</label>
                    <select id="personnelSelect" onchange="remplirInfosPersonnel()">
                        <option value="">-- Sélectionner un personnel --</option>
                    </select>
                </div>

                <div>
                    <label>Matricule</label>
                    <input type="text" id="matriculeAffiche" placeholder="Matricule" readonly />
                </div>

                <div>
                    <label>Nom</label>
                    <input type="text" id="nom" placeholder="Nom" readonly />
                </div>

                <div>
                    <label>Département</label>
                    <input type="text" id="departement" placeholder="Département" readonly />
                </div>

                <div>
                    <label>Position</label>
                    <select id="localisation">
                        <option value="">-- Sélectionner --</option>
                        <option value="Local">Local</option>
                        <option value="Sur terrain">Sur terrain</option>
                    </select>
                </div>

                <div style="display: none;">
                    <label>Date</label>
                    <input type="date" id="datePresence" />
                </div>

                <div>
                    <label>Heure d'arrivée</label>
                    <input type="time" id="heureArrivee" readonly />
                </div>

                <div>
                    <label>Frais (Ar)</label>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <input type="number" id="frais" placeholder="Ex: 5000" min="0" />
                        <span style="font-weight:bold;">Ar</span>
                    </div>
                </div>
            </div>

            <div class="top-actions">
                <button class="btn btn-primary" onclick="ajouterPresence()">Ajouter</button>
            </div>
        </div>

        <div class="card">
            <h2>Liste des présences</h2>
            <div class="top-actions">
                <button class="btn btn-secondary" onclick="exporterPDF()">Exporter en PDF</button>
                <button class="btn btn-success" onclick="exporterExcel()">Exporter en Excel</button>
                <button class="btn btn-primary" onclick="imprimerPresencesFiltrees()">Imprimer</button>
                <button class="btn btn-secondary" onclick="reinitialiserFiltres()">Réinitialiser les filtres</button>
            </div>
            <br>

            <div class="grid">
                <div>
                    <label>Recherche nom / matricule</label>
                    <input type="text" id="rechercheNom" placeholder="Ex: Rakoto ou EMP001" oninput="afficherPresences()" />
                </div>

                <div>
                    <label>Département</label>
                    <select id="filtreDepartement" onchange="afficherPresences()">
                        <option value="">Tous les départements</option>
                    </select>
                </div>

                <div>
                    <label>Date début</label>
                    <input type="date" id="dateDebutFiltre" onchange="afficherPresences()" />
                </div>

                <div>
                    <label>Date fin</label>
                    <input type="date" id="dateFinFiltre" onchange="afficherPresences()" />
                </div>
            </div>

            <br>
            <div id="resumeFiltres" class="filter-summary"></div>
            <div id="tableZone"></div>
        </div>
    </div>

    <!-- MODAL AJOUT PERSONNEL -->
    <div class="modal fade" id="modalPersonnel" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Ajouter un personnel</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="mb-3">
                        <label>Nom</label>
                        <input type="text" id="nomPersonnel" class="form-control" placeholder="Ex: Jean Rakoto">
                    </div>

                    <div class="mb-3">
                        <label>Département</label>
                        <select id="departementPersonnel" class="form-select">
                            <option value="">-- Sélectionner --</option>
                            <option value="DSI">DSI</option>
                            <option value="Finance">Finance</option>
                            <option value="Room">control room</option>
                            <option value="Technique">Technique</option>
                            <option value="stagiaire">stagiaire</option>
                            <option value="Administration">Administration</option>
                            <option value="RH">RH</option>
                            <option value="Direction">Direction</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button class="btn btn-primary" onclick="ajouterPersonnel()">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL LISTE PERSONNEL -->
    <div class="modal fade" id="modalListePersonnel" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Liste des personnels</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="grid mb-3">
                        <div>
                            <label>Recherche personnel</label>
                            <input type="text" id="recherchePersonnel" placeholder="Nom, matricule, département..." oninput="afficherPersonnels()">
                        </div>
                    </div>
                    <div id="tablePersonnel"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL MODIFIER PERSONNEL -->
    <div class="modal fade" id="modalModifierPersonnel" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Modifier un personnel</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="editPersonnelId">

                    <div class="mb-3">
                        <label>Matricule</label>
                        <input type="text" id="editMatriculePersonnel" class="form-control" readonly>
                    </div>

                    <div class="mb-3">
                        <label>Nom</label>
                        <input type="text" id="editNomPersonnel" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Département</label>
                        <select id="editDepartementPersonnel" class="form-select">
                            <option value="">-- Sélectionner --</option>
                            <option value="DSI">DSI</option>
                            <option value="Finance">Finance</option>
                            <option value="Room">control room</option>
                            <option value="Technique">Technique</option>
                            <option value="stagiaire">stagiaire</option>
                            <option value="Administration">Administration</option>
                            <option value="RH">RH</option>
                            <option value="Direction">Direction</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button class="btn btn-primary" onclick="validerModificationPersonnel()">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

</body>
<script src="../js/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
