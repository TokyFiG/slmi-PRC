<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - SLM-I</title>
    <link rel="icon" type="image/png" href="img/logo slmi.png">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   
</head>
<body>
    <div class="card login-card">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <img src="img/logo slmi.png" alt="Logo SLM-I" class="brand-logo mb-3">
                <h1 class="h3 title mb-1">Connexion</h1>
                <p class="subtitle mb-0">Accès au système de gestion de présences</p>
            </div>

            <div id="alertZone"></div>

            <form onsubmit="seConnecter(event)">
                <div class="mb-3">
                    <label for="username" class="form-label">Nom d'utilisateur</label>
                    <input type="text" id="username" class="form-control" placeholder="Entrez votre identifiant" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" id="password" class="form-control" placeholder="Entrez votre mot de passe" required>
                </div>

                <button type="submit" class="btn btn-success text-white w-100">Se connecter</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
